name: TertiaryCourses
options:
  bundleIdPrefix: com.tertiaryinfotech
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: GU9WTSTX9M
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
targets:
  TertiaryCourses:
    type: application
    platform: iOS
    sources:
      - TertiaryCoursesApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.tertiarycoursesapp
        PRODUCT_NAME: Tertiary Courses SG
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
    info:
      path: TertiaryCoursesApp/Info.plist
      properties:
        CFBundleDisplayName: Tertiary Courses
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        TERTIARY_COURSES_API_KEY: ""
        TERTIARY_COURSES_API_BASE_URL: https://lms-tms.tertiaryinfotech.com
        TERTIARY_COURSES_LIST_RUNS_PATH: /api/external/list-course-runs
        TERTIARY_COURSES_GET_RUN_PATH: /api/external/get-course-run
